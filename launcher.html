<style>

        border-width: thin;
        border-color: #41B6E6;
        overflow-x: hidden;
        transition: 0s;
        padding-top: 60px;
    }

    .closebtn {
        padding: 8px 8px 8px 32px;
        text-decoration: none;
        font-size: 12px;
        color: #FFFFFF display: block;
        transition: 0.3s;

    .closebtn:hover {
        color: #f1f1f1;

        background-color: #005eb8;

    .Layout5 {

        padding: 10px;
